<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="500" height="120">
  <defs>
    <style>
      .bg { fill: #090d16; stroke: #1e293b; stroke-width: 2px; }
      
      .text-base {
        font-family: 'Fira Code', 'Courier New', monospace;
        font-size: 42px;
        font-weight: bold;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      
      .neon-cyan { fill: #00ffcc; filter: drop-shadow(0px 0px 10px rgba(0, 255, 204, 0.8)); }
      .neon-purple { fill: #b829ea; filter: drop-shadow(0px 0px 10px rgba(184, 41, 234, 0.8)); }
      .neon-yellow { fill: #f7df1e; filter: drop-shadow(0px 0px 10px rgba(247, 223, 30, 0.8)); }

      .anim-eat, .anim-sleep, .anim-code { opacity: 0; }
      
      .anim-eat { animation: showText 6s infinite; }
      .anim-sleep { animation: showText 6s infinite 2s; }
      .anim-code { animation: showText 6s infinite 4s; }

      @keyframes showText {
        0%, 10% { opacity: 0; transform: translateY(15px) scale(0.95); }
        15%, 30% { opacity: 1; transform: translateY(0) scale(1); }
        33%, 100% { opacity: 0; transform: translateY(-15px) scale(1.05); }
      }

      .progress-bg { fill: #1e293b; }
      .progress-bar { fill: #00ffcc; animation: loadBar 2s infinite linear; filter: drop-shadow(0px 0px 5px #00ffcc); }
      
      @keyframes loadBar {
        0% { width: 0; opacity: 1; }
        90% { width: 300px; opacity: 1; }
        100% { width: 300px; opacity: 0; }
      }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="500" height="120" rx="12" ry="12" />

  <text x="250" y="55" class="text-base neon-yellow anim-eat">EAT</text>
  <text x="250" y="55" class="text-base neon-purple anim-sleep">SLEEP</text>
  <text x="250" y="55" class="text-base neon-cyan anim-code">CODE</text>

  <rect class="progress-bg" x="100" y="90" width="300" height="8" rx="4" ry="4" />
  <rect class="progress-bar" x="100" y="90" width="0" height="8" rx="4" ry="4" />
</svg>
