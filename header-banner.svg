<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="250">
  <defs>
    <!-- สร้างเอฟเฟกต์แสงเงาและมุมกล้อง 3D -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <filter id="3d-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="8" dy="15" stdDeviation="5" flood-color="#000000" flood-opacity="0.8"/>
    </filter>

    <linearGradient id="cyber-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>

    <style>
      /* การตั้งค่า Font สำหรับสไตล์ Hacker/Programmer */
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@700&amp;family=Orbitron:wght@900&amp;display=swap');
      
      .bg { fill: url(#cyber-gradient); }
      .grid-lines { stroke: #334155; stroke-width: 1; opacity: 0.3; }
      
      /* โครงสร้างป้าย 3D ตรงกลาง */
      .banner-panel {
        fill: #090d16;
        stroke: #00ffcc;
        stroke-width: 2;
        filter: url(#3d-shadow);
        animation: floatBanner 4s ease-in-out infinite;
        transform-origin: center;
      }

      /* แอนิเมชันให้ป้ายลอยขึ้นลงเหมือนวัตถุ 3D */
      @keyframes floatBanner {
        0%, 100% { transform: translateY(0px) rotateX(5deg); }
        50% { transform: translateY(-10px) rotateX(15deg); }
      }

      /* แสงนีออนวิ่งรอบกล่อง */
      .neon-border {
        fill: none;
        stroke: #00ffcc;
        stroke-width: 4;
        stroke-dasharray: 200 600;
        animation: borderRun 3s linear infinite;
        filter: url(#neon-glow);
      }
      
      @keyframes borderRun {
        0% { stroke-dashoffset: 800; }
        100% { stroke-dashoffset: 0; }
      }

      /* สไตล์ของข้อความ */
      .title {
        font-family: 'Orbitron', sans-serif;
        font-size: 52px;
        fill: #00ffcc;
        text-anchor: middle;
        filter: url(#neon-glow);
      }
      
      .subtitle {
        font-family: 'Fira Code', monospace;
        font-size: 20px;
        fill: #cbd5e1;
        text-anchor: middle;
        letter-spacing: 2px;
      }
      
      .cursor {
        fill: #00ffcc;
        animation: blink 1s step-end infinite;
      }

      @keyframes blink { 50% { opacity: 0; } }
      
      /* เอฟเฟกต์พิมพ์ข้อความ (Typing Effect) */
      .typing-text {
        overflow: hidden;
        white-space: nowrap;
        animation: typing 3.5s steps(40, end) infinite alternate;
      }
      
      @keyframes typing {
        0%, 20% { width: 0; }
        80%, 100% { width: 450px; }
      }
    </style>
  </defs>

  <!-- พื้นหลังมืด และ ลาย Grid แบบ Cyberpunk -->
  <rect class="bg" width="800" height="250" />
  
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path class="grid-lines" d="M 40 0 L 0 0 0 40" fill="none" />
  </pattern>
  <rect width="800" height="250" fill="url(#grid)" />

  <!-- กลุ่มป้ายข้อความ 3D ตรงกลาง -->
  <g class="banner-panel">
    <!-- กล่องพื้นหลังข้อความ 3D -->
    <rect x="100" y="50" width="600" height="150" rx="15" />
    
    <!-- เส้นนีออนวิ่งรอบกล่อง -->
    <rect class="neon-border" x="100" y="50" width="600" height="150" rx="15" />
    
    <!-- ข้อความหลัก -->
    <text x="400" y="115" class="title">HEY THERE! I'M JC</text>
    
    <!-- ข้อความรองพร้อม Cursor กระพริบ -->
    <g transform="translate(180, 160)">
      <svg width="450" height="30">
         <text x="50%" y="20" class="subtitle typing-text">Code • Build • Level Up</text>
      </svg>
      <rect x="420" y="2" width="12" height="20" class="cursor" />
    </g>
  </g>
  
  <!-- จุดตกแต่ง (Nodes) ตามมุม -->
  <circle cx="120" cy="70" r="4" fill="#00ffcc" filter="url(#neon-glow)" />
  <circle cx="680" cy="70" r="4" fill="#00ffcc" filter="url(#neon-glow)" />
  <circle cx="120" cy="180" r="4" fill="#00ffcc" filter="url(#neon-glow)" />
  <circle cx="680" cy="180" r="4" fill="#00ffcc" filter="url(#neon-glow)" />
</svg>
